version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: quicktransit-postgres
    restart: always
    environment:
      POSTGRES_DB: quicktransit_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - quicktransit-network

  pgadmin:
    image: dpage/pgadmin4
    container_name: quicktransit-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@quicktransit.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    networks:
      - quicktransit-network
    depends_on:
      - postgres

volumes:
  postgres_data:

networks:
  quicktransit-network:
    driver: bridge